services:
  telemt:
    image: raylabpro/telemt
    restart: unless-stopped
    ports:
      - "443:443"
      - "9090:9090"
      - "9091:9091"
    volumes:
      - ./config.toml:/app/config.toml:ro
    read_only: true
    cap_drop: ALL
    cap_add: NET_BIND_SERVICE
    ulimits:
      nofile: 65536
