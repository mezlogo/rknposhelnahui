services:
  telemt:
    image: raylabpro/telemt
    restart: unless-stopped
    ports:
      - "443:443"
      - "9090:9090"
      - "9091:9091"
    volumes:
      - ./config.toml:/app/config.toml:ro
      # - cache:/app/cache
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ulimits:
      nofile: 65536
    user: 0:0
volumes:
  cache:
