services:
  telemt:
    image: raylabpro/telemt
    restart: unless-stopped

    network_mode: host
    # ports:
    #   - "443:443"
    #   - "9090:9090"
    # security_opt:
    #   - no-new-privileges:true
    # cap_drop:
    #   - ALL
    # cap_add:
    #   - NET_BIND_SERVICE
    #   # - CAP_NET_ADMIN
    # ulimits:
    #   nofile:
    #     soft: 65536
    #     hard: 65536

    command: ["/app/config.toml"]
    environment:
      TZ: "Europe/Moscow"
      RUST_LOG: info

    user: 0:0
    # read_only: true
    volumes:
      - ./config.toml:/app/config.toml:ro
      - cache:/app/cache:rw
      # - "./config.toml:/etc/telemt/config.toml:ro"
      - "/etc/timezone:/etc/timezone:ro"
      - "/etc/localtime:/etc/localtime:ro"
      - "/etc/hostname:/etc/hostname:ro"
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
volumes:
  cache:
